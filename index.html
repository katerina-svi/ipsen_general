(function(){
  if (window.__chartPrintPatched) return;

  var inPatchedPrint = false;

  function pokeAllCharts(){
    var els = document.querySelectorAll('.recharts-responsive-container, .recharts-wrapper');
    els.forEach(function(el){
      // Toggle padding to actually change box dimensions, forcing ResizeObserver to fire
      var orig = el.style.padding;
      el.style.padding = '0.001px';
      void el.offsetHeight;
      el.style.padding = orig;
      void el.offsetHeight;

    setTimeout(pokeAllCharts, 600);
    setTimeout(pokeAllCharts, 1100);
    setTimeout(function(){
      try { origPrint(); } finally { inPatchedPrint = false; }
    }, 1500);
  };

  window.addEventListener('beforeprint', pokeAllCharts);

    var mq = window.matchMedia('print');
    var h = function(e){ if (e.matches) pokeAllCharts(); };
